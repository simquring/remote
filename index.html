<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videy Tool</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<div class="max-w-2xl w-full p-6">

<h1 class="text-2xl font-bold text-center mb-4">
🚀 Videy Upload Tool
</h1>

<form id="form" class="bg-white p-4 rounded shadow">

<div class="mb-3">
<label><input type="radio" name="mode" value="single" checked> Single</label>
<label class="ml-4"><input type="radio" name="mode" value="bulk"> Bulk</label>
</div>

<input id="single" class="w-full border p-2 mb-2 rounded"
placeholder="https://video.mp4">

<textarea id="bulk" class="w-full border p-2 mb-2 rounded hidden"
rows="5" placeholder="1 link per baris"></textarea>

<button class="bg-blue-600 text-white w-full py-2 rounded">
UPLOAD
</button>

</form>

<textarea id="result"
class="w-full mt-4 p-3 border rounded"
rows="8" placeholder="Hasil muncul di sini..."></textarea>

</div>

<script>

const WORKER = "https://remote.stakemail91.workers.dev";

document.querySelectorAll("[name=mode]").forEach(r => {
  r.onchange = () => {
    const mode = document.querySelector("[name=mode]:checked").value;
    single.classList.toggle("hidden", mode !== "single");
    bulk.classList.toggle("hidden", mode !== "bulk");
  };
});

form.onsubmit = async (e) => {
  e.preventDefault();

  const mode = document.querySelector("[name=mode]:checked").value;
  let urls = [];

  if (mode === "single") {
    urls = [single.value];
  } else {
    urls = bulk.value.split("\n").map(x => x.trim()).filter(x => x);
  }

  result.value = "⏳ Processing...\n";

  let output = [];

  for (let url of urls) {

    try {
      const res = await fetch(WORKER, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });

      const data = await res.json();

      if (data.success) {
        output.push("✅ " + url);
      } else {
        output.push("❌ " + url + " | " + data.error);
      }

    } catch (err) {
      output.push("❌ " + url + " | FETCH ERROR");
    }

  }

  result.value = output.join("\n");

};

</script>
</body>
</html>
