<script>
const WORKER = "https://remote.stakemail91.workers.dev";

// ✅ ambil form dengan benar
const form = document.getElementById("form");
const result = document.getElementById("result");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const urlInput = document.getElementById("url").value;

  if (!urlInput) {
    result.innerHTML = "❌ Masukkan URL dulu";
    return;
  }

  result.innerHTML = "⏳ Processing...";

  try {
    const res = await fetch(WORKER, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ url: urlInput })
    });

    const data = await res.json();

    if (data.success) {
      // 🔥 redirect ke player
      window.location.href = "player.html?video=" + encodeURIComponent(data.video);
    } else {
      result.innerHTML = `<div class="bg-red-100 p-3 rounded">❌ ${data.error}</div>`;
    }

  } catch (err) {
    result.innerHTML = "❌ Fetch error: " + err.message;
  }
});
</script>
