<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader + Upload Videy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<div class="container mx-auto px-4 py-8 max-w-2xl">

    <h1 class="text-3xl font-bold text-gray-800 text-center mb-6">
        Downloader + Upload Videy
    </h1>

    <form id="formDownload" class="bg-white p-6 rounded-lg shadow-md">

        <h2 class="text-lg font-semibold text-gray-700 mb-4">Pilih Mode</h2>

        <div class="flex space-x-4 mb-4">
            <label class="flex items-center">
                <input type="radio" name="mode" value="single" checked onchange="toggleMode()">
                <span class="ml-2">Single</span>
            </label>
            <label class="flex items-center">
                <input type="radio" name="mode" value="bulk" onchange="toggleMode()">
                <span class="ml-2">Bulk</span>
            </label>
        </div>

        <!-- SINGLE -->
        <div id="single-form">
            <input type="url" id="video_url" placeholder="https://example.com/video.mp4"
                   class="w-full px-3 py-2 border rounded-lg mb-3">
        </div>

        <!-- BULK -->
        <div id="bulk-form" class="hidden">
            <textarea id="bulk_urls" rows="6"
                placeholder="1 link per baris..."
                class="w-full px-3 py-2 border rounded-lg"></textarea>
        </div>

        <button type="submit"
            class="w-full mt-4 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
            🚀 Upload ke Videy
        </button>

    </form>

    <!-- RESULT -->
    <div class="bg-white mt-6 p-4 rounded-lg shadow">
        <h3 class="font-bold mb-2">Hasil:</h3>
        <textarea id="result" rows="6"
            class="w-full border p-2 rounded"></textarea>

        <button onclick="copyAllLinks()"
            class="mt-2 bg-green-600 text-white px-4 py-2 rounded">
            📋 Copy Semua
        </button>
    </div>

</div>

<script>

const WORKER_URL = "https://remote.stakemail91.workers.dev"; // ganti ini

function toggleMode() {
    const mode = document.querySelector('input[name="mode"]:checked').value;

    document.getElementById('single-form').classList.toggle('hidden', mode !== 'single');
    document.getElementById('bulk-form').classList.toggle('hidden', mode !== 'bulk');
}

document.getElementById("formDownload").addEventListener("submit", async (e) => {
    e.preventDefault();

    const mode = document.querySelector('input[name="mode"]:checked').value;
    let urls = [];

    if (mode === "single") {
        urls.push(document.getElementById("video_url").value);
    } else {
        urls = document.getElementById("bulk_urls").value.split("\n").filter(x => x.trim());
    }

    let results = [];

    for (let url of urls) {
        try {
            const res = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    url: url,
                    title: "Auto Upload"
                })
            });

            const text = await res.text();
            results.push(text);

        } catch (err) {
            results.push("ERROR: " + err.message);
        }
    }

    document.getElementById("result").value = results.join("\n\n");
});

function copyAllLinks() {
    const textarea = document.getElementById("result");
    textarea.select();
    document.execCommand("copy");
    alert("✅ Semua hasil dicopy!");
}

</script>

</body>
</html>
