<!DOCTYPE html>
<html>
<head>
    <title>Videy Remote Upload</title>
</head>
<body>

<h2>Remote Upload Videy</h2>

<input type="text" id="url" placeholder="Masukkan URL video" style="width:300px;">
<br><br>
<input type="text" id="title" placeholder="Judul video">
<br><br>

<button onclick="upload()">Upload</button>

<pre id="result"></pre>

<script>
async function upload() {
    const url = document.getElementById("url").value;
    const title = document.getElementById("title").value;

    const res = await fetch("https://remote.stakemail91.workers.dev", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ url, title })
    });

    const data = await res.text();
    document.getElementById("result").innerText = data;
}
</script>

</body>
</html>
